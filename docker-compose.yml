services:
  backend:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${BACKEND_PYTHON_IMAGE:-python:3.11-slim}
    env_file:
      - ./backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${FRONTEND_NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"